version: '3.8'

services:
  menuscraper:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env
    restart: unless-stopped
    # Needs enough memory for 4 parallel Chromium instances
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    shm_size: '1gb'
